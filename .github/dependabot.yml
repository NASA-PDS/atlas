version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    target-branch: "main"
    # Always increase the version requirement
    # to match the new version.
    versioning-strategy: increase
    labels:
      - "dependencies"
      - "javascript"
      - "pdsen-ignore"

  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "pdsen-ignore"

  - package-ecosystem: "docker"
    directory: "/docker/"
    schedule:
      interval: "weekly"
    labels:
      - "pdsen-ignore"

  - package-ecosystem: "terraform"
    directory: "/terraform/"
    schedule:
      interval: "weekly"
    labels:
      - "pdsen-ignore"
